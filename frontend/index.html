<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Homeless Support Finder</title>
<link rel="manifest" href="./manifest.json" />
<link rel="stylesheet" href="./styles.css" />
</head>
<body>
<div class="app-shell">
<header class="app-header">
<div>
<h1>Homeless Support Finder</h1>
<p>Choose the kind of help you need</p>
</div>
</header>

<main class="home-main">
<section class="category-grid">
<button type="button" class="category-card" data-category="shelter">
<h2>Shelter</h2>
<p>Accommodation and housing support</p>
</button>

<button type="button" class="category-card" data-category="advice">
<h2>Advice</h2>
<p>Housing advice and support services</p>
</button>

<button type="button" class="category-card" data-category="crisis_support">
<h2>Crisis support</h2>
<p>Urgent homelessness support services</p>
</button>

<button type="button" class="category-card" data-category="food">
<h2>Food</h2>
<p>Food banks, meals, and community food support</p>
</button>

<button type="button" class="category-card" data-category="medical">
<h2>Medical</h2>
<p>Health, outreach, and medical support services</p>
</button>
</section>
</main>
</div>

<script src="./app.js"></script>
</body>
</html>
