<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service details</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./styles.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 id="serviceName">Service details</h1>
      <p class="subtitle" id="serviceOrg">Support service</p>
    </div>
  </header>

  <main class="container">
    <section class="detail-card">
      <p><strong>Provider:</strong> <span id="serviceProvider">N/A</span></p>
      <p><strong>Type:</strong> <span id="serviceType">N/A</span></p>
      <p><strong>Postcode:</strong> <span id="servicePostcode">N/A</span></p>
      <p><strong>Phone:</strong> <span id="servicePhone">N/A</span></p>
      <p><strong>Address:</strong> <span id="serviceAddress">N/A</span></p>
      <p><strong>Opening times:</strong> <span id="serviceOpening">N/A</span></p>
      <p><strong>Description:</strong> <span id="serviceDescription">N/A</span></p>
      <p><strong>Source:</strong> <a id="serviceSource" href="#" target="_blank" rel="noopener noreferrer">Open source</a></p>

      <div class="service-actions">
        <a id="openMapsBtn" class="primary-btn" href="#" target="_blank" rel="noopener noreferrer" style="display:none;">
          Open in Google Maps directions
        </a>
      </div>

      <p id="routeStatus" class="status-text"></p>
    </section>

    <section class="detail-card">
      <div id="serviceMap" class="service-map"></div>
    </section>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="./app.js"></script>
</body>
</html>
