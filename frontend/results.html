<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nearby support</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <header class="site-header">
      <div class="container">
        <div class="brand-row">
          <div class="brand-mark" aria-hidden="true">SF</div>
          <div>
            <p class="eyebrow">Support Finder</p>
            <h1>Nearby support</h1>
          </div>
        </div>
        <p class="subtitle">Use your location or postcode to see support services close by.</p>
      </div>
    </header>

    <main id="main-content" class="container page-stack">
      <section class="hero-card">
        <h2 class="section-title">Search from a different place</h2>

        <div class="location-actions">
          <button id="resultsUseLocationBtn" class="primary-btn" type="button">
            Use my current location
          </button>
        </div>

        <div class="divider-with-text">
          <span>or</span>
        </div>

        <div class="postcode-row">
          <label class="sr-only" for="postcodeInput">Enter postcode</label>
          <input id="postcodeInput" type="text" placeholder="Enter postcode" />
          <button id="searchBtn" class="secondary-btn" type="button">
            Find services
          </button>
        </div>

        <p id="resultsStatus" class="status-text" aria-live="polite">
          Use your current location or enter a postcode.
        </p>
      </section>

      <section class="content-section">
        <div class="results-header">
          <h2 class="section-title">Results</h2>
        </div>
        <section id="resultsList" class="results-list"></section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
