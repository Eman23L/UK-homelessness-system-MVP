<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nearby support</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Nearby support</h1>
      <p class="subtitle">Find the closest services</p>
    </div>
  </header>

  <main class="container">
    <section class="location-panel">
      <div class="location-actions">
        <button id="resultsUseLocationBtn" class="primary-btn" type="button">Use my current location</button>
      </div>

      <div class="postcode-row">
        <input id="postcodeInput" type="text" placeholder="Enter postcode" />
        <button id="searchBtn" class="secondary-btn" type="button">Find services</button>
      </div>

      <p id="resultsStatus" class="status-text">Enter a postcode or use your current location.</p>
    </section>

    <section id="resultsList" class="results-list"></section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
